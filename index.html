<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Shower Playable Final</title>
<style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
    #wrapper { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; }
    #container { position: relative; height: 100vh; width: calc(100vh * 9 / 16); max-width: 100vw; max-height: calc(100vw * 16 / 9); overflow: hidden; }
    @media (max-aspect-ratio: 9/16) { #container { width: 100vw; height: calc(100vw * 16 / 9); } }
    .bg-img, #canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    #bgAnimation { z-index: 1; transition: filter 1.5s ease; }
    #canvas { z-index: 5; filter: brightness(1.1) contrast(1.1); background: transparent; }
    #splash { position: absolute; inset: 0; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; }
    #splashSpongeContainer { position: relative; width: 100%; height: 100%; z-index: 102; animation: spongePulseGlow 3s infinite ease-in-out; }
    #splashSponge { position: absolute; width: 180px; left: 50%; top: 50%; transform: translate(-50%, -50%) rotate(-15deg); pointer-events: none; z-index: 105; }
    #splashOutline { position: absolute; width: 145px; left: 50%; top: 50%; transform: translate(-50%, -50%) rotate(-15deg); animation: blink 1s infinite; z-index: 110; }
    #splashHand { position: absolute; width: 90px; left: 50%; top: 50%; z-index: 106; animation: handTapBetter 1.5s infinite ease-in-out; }
    #clickLines { position: absolute; width: 80px; left: 50%; top: 50%; z-index: 107; pointer-events: none; opacity: 0; transform: scale(0); animation: clickRays 1.5s infinite ease-in-out; }
    #splashCaption { position: absolute; bottom: 22%; width: 70%; z-index: 108; animation: captionPulse 2.5s infinite ease-in-out; }
    #muteBtn { position: absolute; top: 20px; right: 20px; z-index: 1000; width: 45px; height: 45px; background: rgba(0,0,0,.6); border-radius: 50%; display: none; justify-content: center; align-items: center; color: white; font-size: 24px; border: 2px solid rgba(255,255,255,.2); }
    #overlay { position: absolute; inset: 0; background: #000; z-index: 15; opacity: 0; transition: opacity 1.2s ease; pointer-events: none; }
    #wowEffect { position: absolute; z-index: 14; width: 40%; top: 45%; left: 70%; transform: translate(-50%, -50%) scale(0.5); opacity: 0; pointer-events: none; transition: opacity 0.5s ease-out, transform 0.5s ease-out; }
    #ctaButton { display: none; position: absolute; z-index: 21; bottom: 15%; left: 50%; width: 80%; transform: translateX(-50%); animation: pulse 1.8s infinite; }
    #wowEffect.visible { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    #fxCanvas { position: absolute; inset: 0; z-index: 60; pointer-events: none; }

    @keyframes clickRays { 0%,45% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; } 65% { transform: translate(-50%, -50%) scale(1); opacity: 0; } 100% { opacity: 0; } }
    @keyframes spongePulseGlow { 0%,100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(255,255,255,0)); } 50% { transform: scale(1.08); filter: drop-shadow(0 0 20px rgba(255,255,255,.8)); } }
    @keyframes handTapBetter { 0%,100% { transform: translate(40px,120px); opacity: 0; } 50% { transform: translate(0,0); opacity: 1; } 70% { transform: translate(0,0) scale(.85); opacity: 1; } }
    @keyframes blink { 0%,100% { opacity: .3; } 50% { opacity: 1; } }
    @keyframes pulse { 0%,100% { transform: translate(-50%, 0) scale(1); } 50% { transform: translate(-50%, 0) scale(1.05); } }
    @keyframes captionPulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.03); opacity: .8; } }
</style>
</head>
<body>
<canvas id="fxCanvas"></canvas>
<div id="wrapper">
    <div id="container">
        <img id="staticPoster" src="assets/poster.webp" class="bg-img" style="z-index:2;">
        <video id="bgAnimation" class="bg-img" loop muted playsinline>
            <source src="assets/Comp 1.webm" type="video/webm">
        </video>
        <canvas id="canvas"></canvas>
        <div id="splash">
            <div id="splashSpongeContainer">
                <img src="assets/sponge_outline.webp" id="splashOutline">
                <img src="assets/sponge.webp" id="splashSponge">
                <img src="assets/click_lines.png" id="clickLines">
                <img src="assets/hand-cursor.png" id="splashHand">
            </div>
            <img src="assets/caption.webp" id="splashCaption">
        </div>
        <div id="muteBtn">🔊</div>
        <div id="overlay"></div>
        <img src="assets/wow.webp" id="wowEffect">
        <img src="assets/button.webp" id="ctaButton">
    </div>
</div>

<audio id="bgMusic" src="assets/music.mp3" loop muted playsinline></audio>
<audio id="soundStart" src="assets/vo_start.mp3" muted playsinline></audio>
<audio id="soundFinish" src="assets/vo_finish.mp3" muted playsinline></audio>
<audio id="soundScrub" src="assets/scrub.mp3" loop muted playsinline></audio>

<script>
const fxCanvas = document.getElementById('fxCanvas');
const fx = fxCanvas.getContext('2d');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const brush = new Image(); brush.src = 'assets/sponge.webp';

let particles = [];
let drawing = false, isMuted = false, gameActive = false, finished = false;
let lastX = null, lastY = null, audioUnlocked = false;

function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    const ctxA = new (window.AudioContext || window.webkitAudioContext)();
    if (ctxA.state === 'suspended') ctxA.resume();
}

function startGame() {
    if (gameActive) return;
    gameActive = true;
    const video = document.getElementById('bgAnimation');
    const poster = document.getElementById('staticPoster');
    const bgMusic = document.getElementById('bgMusic');
    const startVO = document.getElementById('soundStart');

    video.play().then(() => {
        poster.style.display = 'none';
        if (!isMuted) {
            bgMusic.muted = false;
            bgMusic.volume = 0.5;
            bgMusic.play().catch(() => {});
            setTimeout(() => { startVO.muted = false; startVO.play().catch(() => {}); }, 150);
        }
    }).catch(() => { poster.style.display = 'none'; });

    document.getElementById('splashSpongeContainer').style.animation = 'none';
    document.getElementById('splashCaption').style.display = 'none';
    document.getElementById('splashOutline').style.display = 'none';
    document.getElementById('splashHand').style.display = 'none';
    document.getElementById('clickLines').style.display = 'none';
    document.getElementById('splash').style.pointerEvents = 'none';
    document.getElementById('muteBtn').style.display = 'flex';

    document.getElementById('soundFinish').muted = isMuted;
    document.getElementById('soundScrub').muted = isMuted;
}

// Подія для самого канвасу (повторне натискання)
canvas.addEventListener('pointerdown', e => {
    if (!gameActive || finished) return;
    drawing = true;
    const r = canvas.getBoundingClientRect();
    lastX = e.clientX - r.left;
    lastY = e.clientY - r.top;
    ctx.globalCompositeOperation = 'destination-out';
    if (!isMuted) document.getElementById('soundScrub').play().catch(() => {});
});

// Подія для сплеш-екрану (перший запуск)
document.getElementById('splash').addEventListener('pointerdown', (e) => {
    e.preventDefault();
    unlockAudio();
    startGame();
    drawing = true;
    const r = canvas.getBoundingClientRect();
    lastX = e.clientX - r.left;
    lastY = e.clientY - r.top;
    if (!isMuted) document.getElementById('soundScrub').play().catch(() => {});
}, { passive: false });

window.addEventListener('pointermove', e => {
    const r = canvas.getBoundingClientRect();
    const x = e.clientX - r.left;
    const y = e.clientY - r.top;

    if (!gameActive && (Math.abs(x) > 0 || Math.abs(y) > 0)) {
        unlockAudio();
        startGame();
    }
    
    handleMove(x, y);
});

function handleMove(x, y) {
    if (!gameActive || finished) return;

    const gSponge = document.getElementById('splashSponge');
    gSponge.style.left = x + 'px';
    gSponge.style.top = y + 'px';

    if (!drawing) return;
    ctx.globalCompositeOperation = 'destination-out';

    if (lastX !== null) {
        const dx = x - lastX, dy = y - lastY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const steps = Math.max(1, Math.floor(dist / 5));
        for (let i = 0; i <= steps; i++) {
            const tx = lastX + (dx * i / steps);
            const ty = lastY + (dy * i / steps);
            ctx.drawImage(brush, tx - 75, ty - 75, 150, 150);
        }
    }
    lastX = x; lastY = y;
    if (Math.random() > 0.9) checkProgress();
}

window.addEventListener('pointerup', () => {
    drawing = false;
    lastX = null; lastY = null;
    document.getElementById('soundScrub').pause();
});

function checkProgress() {
    const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    let clear = 0;
    for (let i = 3; i < pixels.length; i += 400) { if (pixels[i] < 150) clear++; }
    if ((clear / (pixels.length / 400)) * 100 > 80) finishGame();
}

function finishGame() {
    if (finished) return;
    finished = true; drawing = false;
    document.getElementById('splashSponge').style.display = 'none';
    document.getElementById('soundScrub').pause();
    if (!isMuted) document.getElementById('soundFinish').play().catch(() => {});

    setTimeout(() => {
        document.getElementById('overlay').style.opacity = '0.6';
        document.getElementById('bgAnimation').style.filter = 'blur(4px) brightness(0.4)';
        document.getElementById('wowEffect').classList.add('visible'); 
    }, 400);

    setTimeout(() => {
        const btn = document.getElementById('ctaButton');
        btn.style.display = 'block';
        btn.onclick = () => window.open('https://honeytoon.com/comic-video/teach-me-first?n=1', '_self');
    }, 1500);
}

function initFog() {
    const fog = new Image();
    fog.src = 'assets/fog.webp';
    fog.onload = () => {
        ctx.globalCompositeOperation = 'source-over'; 
        ctx.drawImage(fog, 0, 0, canvas.width, canvas.height);
    };
}

function resize() {
    const cont = canvas.parentElement;
    canvas.width = cont.offsetWidth; canvas.height = cont.offsetHeight;
    fxCanvas.width = canvas.width; fxCanvas.height = canvas.height;
    initFog();
}

window.addEventListener('resize', resize);
window.addEventListener('load', resize);
resize();

document.getElementById('muteBtn').addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    isMuted = !isMuted;
    document.querySelectorAll('audio').forEach(a => a.muted = isMuted);
    document.getElementById('muteBtn').innerText = isMuted ? '🔇' : '🔊';
});

// Particles (Краплі)
class Drop {
    constructor(x, y) {
        this.x = x; this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const power = 1.5 + Math.random() * 10;
        this.vx = Math.cos(angle) * power; this.vy = Math.sin(angle) * power - Math.random() * 6;
        this.size = 4 + Math.random() * 10; this.life = 1; this.decay = 0.008 + Math.random() * 0.01;
        this.prevX = x; this.prevY = y;
    }
    update() {
        this.prevX = this.x; this.prevY = this.y;
        this.vy += 0.22; this.x += this.vx; this.y += this.vy;
        this.life -= this.decay;
    }
    draw() {
        fx.beginPath();
        fx.fillStyle = `rgba(120, 200, 255, ${Math.max(this.life, 0)})`;
        fx.arc(this.x, this.y, this.size/2, 0, Math.PI * 2);
        fx.fill();
    }
}
function spawnWaterDrops(x, y, count = 80) { for (let i = 0; i < count; i++) particles.push(new Drop(x, y)); }
function fxLoop() {
    fx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
    particles.forEach((p, i) => { p.update(); p.draw(); if (p.life <= 0) particles.splice(i, 1); });
    requestAnimationFrame(fxLoop);
}
fxLoop();
function getCanvasPos(clientX, clientY) { const r = canvas.getBoundingClientRect(); return { x: clientX - r.left, y: clientY - r.top }; }
</script>
</body>
</html>
