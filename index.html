<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Shower Playable Final</title>
<style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
    #wrapper { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; }
    #container { position: relative; height: 100vh; width: calc(100vh * 9 / 16); max-width: 100vw; max-height: calc(100vw * 16 / 9); overflow: hidden; }
    @media (max-aspect-ratio: 9/16) { #container { width: 100vw; height: calc(100vw * 16 / 9); } }
    
    .bg-img, #canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; top: 0; left: 0; }
    #canvas { z-index: 5; filter: brightness(1.1) contrast(1.1); }
    
    /* SPLASH SCREEN */
    #splash {
        position: absolute; inset: 0; z-index: 100;
        display: flex; justify-content: center; align-items: center;
        transition: opacity 0.3s ease; cursor: pointer;
    }
    .splash-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 101; }
    
    #splashSpongeContainer { 
        position: relative; z-index: 102; 
        display: flex; justify-content: center; align-items: center;
        animation: spongePulse 2s infinite ease-in-out;
    }
    #clickLines {
    position: absolute;
    width: 80px;
    z-index: 104;
    pointer-events: none;
    top: 40%;
    left: 25%;
    opacity: 0;
    transform: scale(0);
    animation: clickRays 1.5s infinite ease-in-out;
}

@keyframes clickRays {
    0%, 45% { 
        transform: scale(0); 
        opacity: 0; 
    }
    50% { 
        transform: scale(1.2); 
        opacity: 1; 
    }
    65% { 
        transform: scale(1); 
        opacity: 0; 
    }
    100% { 
        opacity: 0; 
    }
}
    #splashSponge { width: 180px; transform: rotate(-15deg); }
    #splashOutline { position: absolute; width: 150px; animation: blink 1.2s infinite; transform: rotate(-15deg); }
    #splashHand { position: absolute; width: 70px; top: 55%; left: 40%; animation: handTap 1.5s infinite ease-in-out; }

    /* GAME UI */
    #sponge { position: absolute; height: 160px; width: 160px; z-index: 10; pointer-events: none; transform: translate(-50%, -50%) rotate(-15deg); display: none; }
    #muteBtn { position: absolute; top: 20px; right: 20px; z-index: 1000; width: 45px; height: 45px; background: rgba(0,0,0,0.6); border-radius: 50%; display: none; justify-content: center; align-items: center; color: white; font-size: 24px; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; }
    #overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.8); z-index: 15; opacity: 0; transition: opacity 1.5s ease; pointer-events: none; }
    #wowEffect { display: none; position: absolute; z-index: 20; width: 40%; top: 35%; left: 70%; transform: translate(-50%, -50%); pointer-events: none; }
    #ctaButton { display: none; position: absolute; z-index: 21; bottom: 15%; left: 50%; width: 80%; transform: translateX(-50%); cursor: pointer; animation: pulse 1.8s infinite; }

    /* ANIMATIONS */
    @keyframes spongePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); filter: drop-shadow(0 0 15px rgba(255,255,255,0.4)); } }
    @keyframes handTap { 0%, 100% { transform: translate(30px, 100px); opacity: 0; } 50% { transform: translate(0, 0); opacity: 1; } 70% { transform: translate(0, 0) scale(0.9); opacity: 1; } }
    @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    @keyframes pulse { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.05); } }
</style>
</head>
<body>

<div id="wrapper">
    <div id="container">
        <video id="bgAnimation" class="bg-img" loop muted playsinline>
            <source src="assets/Comp 1.webm" type="video/webm">
        </video>
        <canvas id="canvas"></canvas>

        <div id="splash">
            <img src="assets/fog.webp" class="splash-bg"> 
            <div id="splashSpongeContainer">
                <img src="assets/sponge_outline.webp" id="splashOutline">
                <img src="assets/click_lines.png" id="clickLines">
                <img src="assets/sponge.webp" id="splashSponge">
                <img src="assets/hand-cursor.png" id="splashHand">
            </div>
        </div>

        <div id="muteBtn">🔊</div>
        <div id="overlay"></div>
        <img src="assets/sponge.webp" id="sponge">
        <img src="assets/wow.webp" id="wowEffect">
        <img src="assets/button.webp" id="ctaButton">
    </div>
</div>

<!-- AUDIO -->
<audio id="bgMusic" src="assets/music.mp3" loop playsinline></audio>
<audio id="soundStart" src="assets/vo_start.mp3" playsinline></audio>
<audio id="soundAlmost" src="assets/vo_almost.mp3" playsinline></audio>
<audio id="soundFinish" src="assets/vo_finish.mp3" playsinline></audio>
<audio id="soundScrub" src="assets/scrub.mp3" loop playsinline></audio>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const brush = new Image(); brush.src = 'assets/sponge.webp';

let drawing = false, isMuted = false, gameActive = false, playedAlmost = false, finished = false;
let lastX = null, lastY = null;

function getCoords(e) {
    const r = canvas.getBoundingClientRect();
    return {
        x: e.clientX - r.left,
        y: e.clientY - r.top
    };
}

function initGameSession(e) {
    if (gameActive) return;
    gameActive = true;

    // Масив усіх аудіо-елементів
    const audios = [
        document.getElementById('bgMusic'),
        document.getElementById('soundStart'),
        document.getElementById('soundAlmost'),
        document.getElementById('soundFinish'),
        document.getElementById('soundScrub')
    ];

    // КЛЮЧОВИЙ МОМЕНТ: Розблоковуємо кожен файл
    audios.forEach(audio => {
        audio.muted = false; // На всякий випадок
        // Пробуємо запустити
        let playPromise = audio.play();
        
        if (playPromise !== undefined) {
            playPromise.then(() => {
                // Якщо це не музика і не початковий звук — одразу на паузу
                if (audio.id !== 'bgMusic' && audio.id !== 'soundStart') {
                    audio.pause();
                    audio.currentTime = 0;
                }
            }).catch(error => {
                console.log("Audio block error: ", error);
            });
        }
    });

    // Налаштовуємо гучність фону
    const bgMusic = document.getElementById('bgMusic');
    bgMusic.volume = 0.2; // Зроби трохи голосніше для тесту (0.09 дуже тихо)

    // Решта логіки (сплеш, відео)
    document.getElementById('splash').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('muteBtn').style.display = 'flex';
        document.getElementById('sponge').style.display = 'block';
    }, 300);

    document.getElementById('bgAnimation').play();

    // Малювання
    drawing = true;
    const coords = getCoords(e);
    lastX = coords.x;
    lastY = coords.y;
    handleMove(coords.x, coords.y);

    if (!isMuted) document.getElementById('soundScrub').play();
}

function handleMove(x, y) {
    if (!gameActive || finished) return;

    const gSponge = document.getElementById('sponge');
    gSponge.style.left = x + 'px';
    gSponge.style.top = y + 'px';

    if (!drawing) return;

    ctx.globalCompositeOperation = 'destination-out';
    ctx.shadowBlur = 20; 
    ctx.shadowColor = 'black'; 

    if (lastX !== null) {
        const dx = x - lastX, dy = y - lastY, dist = Math.sqrt(dx*dx + dy*dy);
        const steps = Math.max(1, Math.floor(dist / 5));
        for (let i = 0; i <= steps; i++) {
            const tx = lastX + (dx * i/steps), ty = lastY + (dy * i/steps);
            ctx.drawImage(brush, tx - 75, ty - 75, 150, 150);
        }
    }
    lastX = x; lastY = y;

    if (Math.random() > 0.96) checkProgress();
    ctx.shadowBlur = 0;
}

function checkProgress() {
    if (finished) return;
    const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    let clear = 0;
    const step = 800; // Оптимізація перевірки
    for (let i = 3; i < pixels.length; i += step) { if (pixels[i] < 150) clear++; }
    const pct = (clear / (pixels.length / step)) * 100;
    
    if (pct > 50 && !playedAlmost && !finished) {
        playedAlmost = true;
        setTimeout(() => { 
            const sA = document.getElementById('soundAlmost');
            if(!isMuted && !finished && sA.paused) sA.play(); 
        }, 600); 
    }
    if (pct > 80) finishGame();
}
function finishGame() {
    if (finished) return;
    finished = true;
    drawing = false;
    document.getElementById('soundScrub').pause();
    document.getElementById('sponge').style.display = 'none';
    
    if(!isMuted) document.getElementById('soundFinish').play();
    
    setTimeout(() => { 
        const wow = document.getElementById('wowEffect');
        wow.style.display = 'block'; 
        wow.style.animation = 'pulse 1s infinite';
    }, 600);

    setTimeout(() => { 
        const btn = document.getElementById('ctaButton');
        btn.style.display = 'block'; 
        btn.onclick = () => window.open('https://your-link.com');
    }, 1600);

    setTimeout(() => { 
        document.getElementById('overlay').style.opacity = '1';
        document.getElementById('bgAnimation').style.filter = 'blur(0px) brightness(0.6)';
    }, 3200);
}

document.getElementById('splash').addEventListener('pointerdown', initGameSession);

window.addEventListener('pointermove', (e) => {
    if (!gameActive || finished) return;
    const coords = getCoords(e);
    handleMove(coords.x, coords.y);
});

window.addEventListener('pointerdown', (e) => {
    if (!gameActive || finished) return;
    drawing = true;
    const coords = getCoords(e);
    lastX = coords.x;
    lastY = coords.y;
    if (!isMuted) {
        const sc = document.getElementById('soundScrub');
        if (sc.paused) sc.play();
    }
});

window.addEventListener('pointerup', () => {
    drawing = false;
    lastX = null;
    lastY = null;
    document.getElementById('soundScrub').pause();
});

function resize() {
    canvas.width = canvas.parentElement.offsetWidth;
    canvas.height = canvas.parentElement.offsetHeight;
    const fog = new Image();
    fog.src = 'assets/fog.webp';
    fog.onload = () => {
        ctx.globalCompositeOperation = 'source-over';
        ctx.drawImage(fog, 0, 0, canvas.width, canvas.height);
    };
}
window.addEventListener('resize', resize); resize();

document.getElementById('muteBtn').addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    isMuted = !isMuted;
    document.querySelectorAll('audio').forEach(a => a.muted = isMuted);
    document.getElementById('muteBtn').innerText = isMuted ? '🔇' : '🔊';
});
</script>
</body>
</html>
