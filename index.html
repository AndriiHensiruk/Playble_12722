<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Shower Playable Final</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    touch-action: none;
    font-family: sans-serif;
}

#wrapper {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
}

#container {
    position: relative;
    height: 100vh;
    width: calc(100vh * 9 / 16);
    max-width: 100vw;
    max-height: calc(100vw * 16 / 9);
    overflow: hidden;
}

@media (max-aspect-ratio: 9/16) {
    #container {
        width: 100vw;
        height: calc(100vw * 16 / 9);
    }
}

.bg-img,
#canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#canvas {
    z-index: 5;
    filter: brightness(1.1) contrast(1.1);
    background: transparent;
}

/* SPLASH */
#splash {
    position: absolute;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    pointer-events: auto;
}

#splashSpongeContainer {
    position: relative;
    width: 100%;
    height: 100%;
    z-index: 102;
    animation: spongePulseGlow 3s infinite ease-in-out;
}

#splashSponge {
    position: absolute;
    width: 180px;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) rotate(-15deg);
    pointer-events: none;
    z-index: 105;
}

#splashOutline {
    position: absolute;
    width: 145px;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) rotate(-15deg);
    animation: blink 1s infinite;
    z-index: 110;
}

#splashHand {
    position: absolute;
    width: 90px;
    left: 50%;
    top: 50%;
    z-index: 106;
    animation: handTapBetter 1.5s infinite ease-in-out;
    transition: opacity .3s ease;
}

#clickLines {
    position: absolute;
    width: 80px;
    left: 50%;
    top: 50%;
    z-index: 107;
    pointer-events: none;
    opacity: 0;
    transform: scale(0);
    animation: clickRays 1.5s infinite ease-in-out;
}

#splashCaption {
    position: absolute;
    bottom: 22%;
    width: 70%;
    z-index: 108;
    animation: captionPulse 2.5s infinite ease-in-out;
}

/* GAME UI */
#muteBtn {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 1000;
    width: 45px;
    height: 45px;
    background: rgba(0,0,0,.6);
    border-radius: 50%;
    display: none;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 24px;
    border: 2px solid rgba(255,255,255,.2);
}

#overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,.8);
    z-index: 15;
    opacity: 0;
    transition: opacity .8s ease;
    pointer-events: none;
}

#wowEffect {
    position: absolute;
    z-index: 20;
    width: 40%; 
    top: 45%;   
    left: 70%; 
    transform: translate(-50%, -50%) scale(0.5); 
    opacity: 0; 
    pointer-events: none; 
    transition: opacity 0.5s ease-out, transform 0.5s ease-out, filter 0.8s ease;
    filter: brightness(1);
}
#ctaButton {
    display: none;
    position: absolute;
    z-index: 21;
    bottom: 15%;
    left: 10%;
    width: 80%;
    transform: translate(-50%);
    animation: pulse 1.8s infinite;
}

#wowEffect.visible {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    animation: wowPulse 2.5s infinite ease-in-out;
}

#fxCanvas {
    position: absolute;
    inset: 0;
    z-index: 60;
    pointer-events: none;
}

/* ANIMATIONS */
@keyframes clickRays {
    0%,45% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    65% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    100% { opacity: 0; }
}
@keyframes spongePulseGlow {
    0%,100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(255,255,255,0)); }
    50% { transform: scale(1.08); filter: drop-shadow(0 0 20px rgba(255,255,255,.8)); }
}
@keyframes handTapBetter {
    0%,100% { transform: translate(40px,120px); opacity: 0; }
    50% { transform: translate(0,0); opacity: 1; }
    70% { transform: translate(0,0) scale(.85); opacity: 1; }
}
@keyframes blink {
    0%,100% { opacity: .3; }
    50% { opacity: 1; }
}
@keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}
@keyframes captionPulse {
    0%,100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.03); opacity: .8; }
}
@keyframes wowPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.08); }
}
</style>
</head>

<body>
<canvas id="fxCanvas"></canvas>
<div id="wrapper">
    <div id="container">
        <img id="staticPoster" src="assets/poster.webp" class="bg-img" style="z-index:2;">
        <video id="bgAnimation" class="bg-img" loop muted playsinline>
            <source src="assets/Comp 1.webm" type="video/webm">
        </video>
        <canvas id="canvas"></canvas>

        <div id="splash">
            <div id="splashSpongeContainer">
                <img src="assets/sponge_outline.webp" id="splashOutline">
                <img src="assets/sponge.webp" id="splashSponge">
                <img src="assets/click_lines.png" id="clickLines">
                <img src="assets/hand-cursor.png" id="splashHand">
            </div>
            <img src="assets/caption.webp" id="splashCaption">
        </div>

        <div id="muteBtn">🔊</div>
        <div id="overlay"></div>
        <img src="assets/wow.webp" id="wowEffect">
        <img src="assets/button.webp" id="ctaButton">
    </div>
</div>

<audio id="bgMusic" src="assets/music.mp3" loop  playsinline></audio>
<audio id="soundStart" src="assets/vo_start.mp3"  playsinline></audio>
<audio id="soundFinish" src="assets/vo_finish.mp3"  playsinline></audio>
<audio id="soundScrub" src="assets/scrub.mp3" loop  playsinline></audio>

<script>
const fxCanvas = document.getElementById('fxCanvas');
const fx = fxCanvas.getContext('2d');
let particles = [];
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });

const brush = new Image();
brush.src = 'assets/sponge.webp';

let drawing = false;
let isMuted = false;
let gameActive = false;
let finished = false;
let lastX = null;
let lastY = null;

let audioUnlocked = false;

function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;

    // Всі play() СИНХРОННО, без жодного await — зберігаємо gesture tick
    const bgMusic    = document.getElementById('bgMusic');
    const startSound = document.getElementById('soundStart');
    const scrubSound = document.getElementById('soundScrub');
    const finSound   = document.getElementById('soundFinish');

    // Silent unlock для iOS/Telegram: грати тихо → зупинити → зняти mute
    [bgMusic, startSound, scrubSound, finSound].forEach(el => {
        el.muted = true;
        el.play().then(() => {
            el.pause();
            el.currentTime = 0;
            el.muted = false;
        }).catch(() => { el.muted = false; });
    });
}

function handleFirstContact(e) {
    if (gameActive) return;
    if (e.cancelable) e.preventDefault();

    // 1. Синхронно знімаємо блокування
    unlockAudio();

    // 2. Синхронно запускаємо всі звуки — ВСЕ В ОДИН ТИК без await
    const bgMusic    = document.getElementById('bgMusic');
    const startSound = document.getElementById('soundStart');
    const scrubSound = document.getElementById('soundScrub');

    bgMusic.volume = 0.4;

    // .play() повертає Promise але ми НЕ await-имо — просто ловимо помилки
    bgMusic.play().catch(() => {
        // fallback: спробуємо ще раз через 300ms якщо unlock не встиг
        setTimeout(() => bgMusic.play().catch(() => {}), 300);
    });

    startSound.currentTime = 0;
    startSound.play().catch(() => {
        setTimeout(() => startSound.play().catch(() => {}), 300);
    });

    // 3. Запускаємо гру
    startGame();

    const r = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

    lastX = clientX - r.left;
    lastY = clientY - r.top;
    drawing = true;

    scrubSound.currentTime = 0;
    scrubSound.play().catch(() => {});

    handleMove(lastX, lastY);
}

function startGame() {
    if (gameActive) return;
    gameActive = true;

    const video = document.getElementById('bgAnimation');
    const poster = document.getElementById('staticPoster');
    
    document.getElementById('splashSpongeContainer').style.animation = 'none';

    // Відео
    video.play().catch(() => {
        video.muted = true;
        video.play();
    });

    video.style.opacity = '1';
    document.getElementById('splashCaption').style.display = 'none';
    document.getElementById('splashOutline').style.display = 'none';
    document.getElementById('splashHand').style.display = 'none';
    document.getElementById('clickLines').style.display = 'none';
    document.getElementById('splash').style.pointerEvents = 'none';

    setTimeout(() => {
        poster.style.display = 'none';
        document.getElementById('muteBtn').style.display = 'flex';
    }, 500);
}

const splash = document.getElementById('splash');

async function handleFirstContact(e) {
    if (gameActive) return;
    if (e.cancelable) e.preventDefault();

    await unlockAudio(); // чекаємо завершення розблокування

    const startSound = document.getElementById('soundStart');
    const bgMusic = document.getElementById('bgMusic');

    startGame();

    // play() одразу після unlock, в тому ж gesture stack
    try {
        startSound.currentTime = 0;
        await startSound.play();
    } catch(err) { console.log("VO Error:", err); }

    try {
        bgMusic.volume = 0.4;
        await bgMusic.play();
    } catch(e) {}

    const r = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    lastX = clientX - r.left;
    lastY = clientY - r.top;
    drawing = true;

    const scrubSound = document.getElementById('soundScrub');
    try {
        scrubSound.currentTime = 0;
        await scrubSound.play();
    } catch(e) {}

    handleMove(lastX, lastY);
}

splash.addEventListener('touchstart', handleFirstContact, { passive: false });
splash.addEventListener('mousedown', handleFirstContact);

function handleMove(x, y) {
    if (!gameActive || finished) return;

    const gSponge = document.getElementById('splashSponge');
    gSponge.style.left = x + 'px';
    gSponge.style.top = y + 'px';
    gSponge.style.transform = 'translate(-50%, -50%) rotate(-15deg)';

    if (!drawing) return;

    ctx.globalCompositeOperation = 'destination-out';
    ctx.shadowBlur = 25;
    ctx.shadowColor = 'black';

    if (lastX !== null) {
        const dx = x - lastX;
        const dy = y - lastY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const steps = Math.max(1, Math.floor(dist / 5));

        for (let i = 0; i <= steps; i++) {
            const tx = lastX + (dx * i / steps);
            const ty = lastY + (dy * i / steps);
            ctx.drawImage(brush, tx - 75, ty - 75, 150, 150);
        }
    }

    lastX = x;
    lastY = y;

    if (Math.random() > 0.9) checkProgress();
    ctx.shadowBlur = 0;
}

function checkProgress() {
    const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    let clear = 0;
    for (let i = 3; i < pixels.length; i += 400) {
        if (pixels[i] < 150) clear++;
    }
    const pct = (clear / (pixels.length / 400)) * 100;
    if (pct > 80) finishGame();
}

function finishGame() {
    if (finished) return;
    finished = true;
    drawing = false;

    document.getElementById('splashSponge').style.display = 'none';
    document.getElementById('soundScrub').pause();
    spawnWaterDrops(canvas.width / 2, canvas.height / 2, 120);

    setTimeout(() => {
        const wow = document.getElementById('wowEffect');
        wow.classList.add('visible'); 

        if (!isMuted) {
            const finishSound = document.getElementById('soundFinish');
            finishSound.muted = false;
            finishSound.currentTime = 0;
            finishSound.play().catch(() => {});
        }
    }, 500);

    setTimeout(() => {
        const btn = document.getElementById('ctaButton');
        btn.style.display = 'block';
        btn.classList.add('pulse-anim');
        btn.onclick = () => { 
            window.open('https://honeytoon.com/comic-video/teach-me-first?n=1', '_self'); 
        };
    }, 1500);

    setTimeout(() => {

        document.getElementById('overlay').style.opacity = '1';
 
        document.getElementById('bgAnimation').style.filter = 'blur(2px) brightness(0.6)';
   
        const wow = document.getElementById('wowEffect');
        wow.style.filter = 'brightness(0.6)'; 
        // Також можна трохи зменшити прозорість, якщо потрібно:
        // wow.style.opacity = '0.8';
    }, 2500);
}

canvas.addEventListener('pointerdown', async e => {
    if (!gameActive || finished) return;
    drawing = true;
    const r = canvas.getBoundingClientRect();
    lastX = e.clientX - r.left;
    lastY = e.clientY - r.top;
    const scrub = document.getElementById('soundScrub');
    if (!isMuted) {
        try { await scrub.play(); } catch(e) {}
    }
});

window.addEventListener('pointermove', e => {
    if (!gameActive) return;
    const r = canvas.getBoundingClientRect();
    handleMove(e.clientX - r.left, e.clientY - r.top);
});

window.addEventListener('pointerup', () => {
    drawing = false;
    lastX = null;
    document.getElementById('soundScrub').pause();
});

window.addEventListener('load', () => {
    const v = document.getElementById('bgAnimation');
    v.muted = true;
    v.play().catch(() => {});
});

function initFog() {
    const fog = new Image();
    fog.src = 'assets/fog.webp';
    fog.onload = () => {
        ctx.globalCompositeOperation = 'source-over'; 
        ctx.drawImage(fog, 0, 0, canvas.width, canvas.height);
    };
}

function resize() {
    canvas.width = canvas.parentElement.offsetWidth;
    canvas.height = canvas.parentElement.offsetHeight;
    fxCanvas.width = canvas.width;
    fxCanvas.height = canvas.height;
    initFog();
}

window.addEventListener('resize', resize);
resize();

document.getElementById('muteBtn').addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    isMuted = !isMuted;
    document.querySelectorAll('audio').forEach(a => a.muted = isMuted);
    document.getElementById('muteBtn').innerText = isMuted ? '🔇' : '🔊';
});

/* PARTICLES */
class Drop {
    constructor(x, y) {
        this.x = x; this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const power = 1.5 + Math.random() * 10;
        this.vx = Math.cos(angle) * power;
        this.vy = Math.sin(angle) * power - Math.random() * 6;
        this.size = 4 + Math.random() * 10;
        this.gravity = 0.22;
        this.friction = 0.98;
        this.life = 1;
        this.decay = 0.008 + Math.random() * 0.01;
        this.prevX = x; this.prevY = y;
    }
    update() {
        this.prevX = this.x; this.prevY = this.y;
        this.vy += this.gravity;
        this.x += this.vx; this.y += this.vy;
        this.vx *= this.friction; this.vy *= this.friction;
        if (this.y + this.size > fxCanvas.height) {
            this.y = fxCanvas.height - this.size;
            this.vy *= -0.35;
        }
        this.life -= this.decay;
    }
    draw() {
        const dx = this.x - this.prevX;
        const dy = this.y - this.prevY;
        const speed = Math.sqrt(dx * dx + dy * dy);
        fx.save();
        fx.translate(this.x, this.y);
        fx.rotate(Math.atan2(dy, dx));
        const stretch = Math.min(speed * 0.4, 6);
        fx.beginPath();
        const alpha = Math.max(this.life, 0);
        fx.fillStyle = `rgba(120, 200, 255, ${alpha})`;
        fx.ellipse(0, 0, this.size + stretch, this.size * 0.65, 0, 0, Math.PI * 2);
        fx.fill();
        fx.restore();
    }
}
function spawnWaterDrops(x, y, count = 80) {
    for (let i = 0; i < count; i++) particles.push(new Drop(x, y));
}
function fxLoop() {
    fx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
    particles.forEach((p, i) => {
        p.update(); p.draw();
        if (p.life <= 0) particles.splice(i, 1);
    });
    requestAnimationFrame(fxLoop);
}
fxLoop();
</script>

</body>
</html>
