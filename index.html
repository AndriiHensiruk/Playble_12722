<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Shower Playable Final</title>

<style>
html, body {
    margin: 0; padding: 0; overflow: hidden;
    background: #000; touch-action: none; font-family: sans-serif;
}

#wrapper {
    position: fixed; inset: 0;
    display: flex; justify-content: center; align-items: center;
}

#container {
    position: relative;
    height: 100vh; width: calc(100vh * 9 / 16);
    max-width: 100vw; max-height: calc(100vw * 16 / 9);
    overflow: hidden;
}

@media (max-aspect-ratio: 9/16) {
    #container { width: 100vw; height: calc(100vw * 16 / 9); }
}

.bg-img, #canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
}

#bgAnimation { z-index: 1; filter: blur(0px); transition: filter 1s ease; }
#canvas { z-index: 5; filter: brightness(1.1) contrast(1.1); background: transparent; }

/* UI */
#muteBtn {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 1000;
    width: 45px;
    height: 45px;
    background: rgba(0, 0, 0, 0.6);
    border-radius: 50%;
    display: none;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 20px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s, border-color 0.3s;
}

#muteBtn:active { transform: scale(0.9); }

#overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,.8);
    z-index: 15; opacity: 0; transition: opacity .8s ease; pointer-events: none;
}

#wowEffect {
    position: absolute; z-index: 14; width: 40%; top: 45%; left: 70%;
    transform: translate(-50%, -50%) scale(0.5); opacity: 0; pointer-events: none;
    transition: opacity 0.5s ease-out, transform 0.5s ease-out;
}

#wowEffect.visible {
    opacity: 1; transform: translate(-50%, -50%) scale(1);
    animation: wowPulse 1.8s infinite 0.5s;
}

#ctaButton {
    display: none; position: absolute; z-index: 21; bottom: 15%; left: 50%;
    width: 80%; transform: translate(-50%, 0); animation: buttonPulse 1.8s infinite;
}

/* SPONGE & SPLASH */
#splash { position: absolute; inset: 0; z-index: 100; pointer-events: auto; }
#splashSponge {
    position: absolute; width: 180px; left: 50%; top: 50%;
    transform: translate(-50%, -50%) rotate(-15deg); z-index: 105; pointer-events: none;
}
#splashOutline {
    position: absolute; width: 145px; left: 50%; top: 50%;
    transform: translate(-50%, -50%) rotate(-15deg); animation: blink 1s infinite; z-index: 110;
}
#splashHand {
    position: absolute; width: 90px; left: 50%; top: 50%;
    z-index: 106; animation: handTapBetter 1.5s infinite ease-in-out;
}
#splashCaption {
    position: absolute; bottom: 22%; left: 15%; width: 70%;
    z-index: 108; animation: captionPulse 2.5s infinite ease-in-out;
}

@keyframes wowPulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); } }
@keyframes buttonPulse { 0%, 100% { transform: translate(-50%, 0) scale(1); } 50% { transform: translate(-50%, 0) scale(1.05); } }
@keyframes handTapBetter { 0%,100% { transform: translate(40px,120px); opacity: 0; } 50% { transform: translate(0,0); opacity: 1; } 70% { transform: translate(0,0) scale(.85); opacity: 1; } }
@keyframes blink { 0%,100% { opacity: .3; } 50% { opacity: 1; } }
@keyframes captionPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }

#fxCanvas { position: absolute; inset: 0; z-index: 60; pointer-events: none; }
</style>
</head>

<body>
<canvas id="fxCanvas"></canvas>
<div id="wrapper">
    <div id="container">
        <img id="staticPoster" src="assets/poster.webp" class="bg-img" style="z-index:2;">
        <video id="bgAnimation" class="bg-img" loop muted playsinline>
            <source src="assets/Comp 1.webm" type="video/webm">
        </video>
        <canvas id="canvas"></canvas>

        <div id="splash">
            <img src="assets/sponge_outline.webp" id="splashOutline">
            <img src="assets/sponge.webp" id="splashSponge">
            <img src="assets/hand-cursor.png" id="splashHand">
            <img src="assets/caption.webp" id="splashCaption">
        </div>

        <div id="muteBtn">🔊</div>
        <div id="overlay"></div>
        <img src="assets/wow.webp" id="wowEffect">
        <img src="assets/button.webp" id="ctaButton">
    </div>
</div>

<audio id="bgMusic" src="assets/music.mp3" loop playsinline></audio>
<audio id="soundStart" src="assets/vo_start.mp3" playsinline></audio>
<audio id="soundFinish" src="assets/vo_finish.mp3" playsinline></audio>
<audio id="soundScrub" src="assets/scrub.mp3" loop playsinline></audio>

<script>
const fxCanvas = document.getElementById('fxCanvas');
const fx = fxCanvas.getContext('2d');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const brush = new Image(); brush.src = 'assets/sponge.webp';

let particles = [];
let drawing = false, isMuted = false, gameActive = false, finished = false;
let lastX = null, lastY = null, audioInitialized = false;

function initAudio() {
    if (audioInitialized) return;
    
    // Прогріваємо лише довгі або фонові звуки, крім стартового вигуку
    const soundsToWarm = [
        document.getElementById('bgMusic'),
        document.getElementById('soundScrub'),
        document.getElementById('soundFinish')
    ];

    soundsToWarm.forEach(s => {
        s.muted = false;
        let p = s.play();
        if (p !== undefined) {
            p.then(() => { 
                if (s.id !== 'bgMusic') { s.pause(); s.currentTime = 0; } 
            }).catch(e => console.log("Warmup error:", e));
        }
    });

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (AudioContext) {
        const tCtx = new AudioContext();
        if (tCtx.state === 'suspended') tCtx.resume();
    }

    audioInitialized = true;
}

function startGame() {
    if (gameActive) return;
    gameActive = true;
    
    document.getElementById('bgAnimation').play().catch(() => {});
    
    // UI зміни
    document.getElementById('splashOutline').style.display = 'none';
    document.getElementById('splashHand').style.display = 'none';
    document.getElementById('splashCaption').style.display = 'none';
    document.getElementById('splash').style.pointerEvents = 'none';

    setTimeout(() => {
        document.getElementById('staticPoster').style.display = 'none';
        document.getElementById('muteBtn').style.display = 'flex';
        document.getElementById('muteBtn').innerHTML = isMuted ? '🔇' : '🔊';
    }, 500);

    if (!isMuted) {
        // Запускаємо фонову музику
        const bgMusic = document.getElementById('bgMusic');
        bgMusic.muted = false;
        bgMusic.volume = 0.5;
        bgMusic.play().catch(() => {});
        
        // Запускаємо ПЕРШИЙ ВИГУК з мінімальною затримкою для стабільності на iOS
        setTimeout(() => {
            const startSound = document.getElementById('soundStart');
            startSound.muted = false;
            startSound.currentTime = 0;
            startSound.play().catch(e => console.log("Start sound error:", e));
        }, 100);
    }
}

/* TOUCH START */
document.getElementById('splash').addEventListener('pointerdown', (e) => {
    e.preventDefault();
    initAudio();
    startGame();
    drawing = true;
    const r = canvas.getBoundingClientRect();
    lastX = e.clientX - r.left; lastY = e.clientY - r.top;
    if (!isMuted) document.getElementById('soundScrub').play().catch(() => {});
}, { passive: false });

function handleMove(x, y) {
    if (!gameActive || finished) return;
    const gSponge = document.getElementById('splashSponge');
    gSponge.style.left = x + 'px'; gSponge.style.top = y + 'px';

    if (!drawing) return;

    ctx.globalCompositeOperation = 'destination-out';
    if (lastX !== null) {
        const dx = x - lastX, dy = y - lastY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const steps = Math.max(1, Math.floor(dist / 5));
        for (let i = 0; i <= steps; i++) {
            const tx = lastX + (dx * i / steps);
            const ty = lastY + (dy * i / steps);
            ctx.drawImage(brush, tx - 75, ty - 75, 150, 150);
        }
    }
    lastX = x; lastY = y;
    if (Math.random() > 0.9) checkProgress();
}

function checkProgress() {
    const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    let clear = 0;
    for (let i = 3; i < pixels.length; i += 400) { if (pixels[i] < 150) clear++; }
    if ((clear / (pixels.length / 400)) * 100 > 80) finishGame();
}

function finishGame() {
    if (finished) return;
    finished = true; drawing = false;
    document.getElementById('splashSponge').style.display = 'none';
    document.getElementById('soundScrub').pause();
    spawnWaterDrops(canvas.width / 2, canvas.height / 2, 100);
    const sf = document.getElementById('soundFinish');
    sf.muted = isMuted; sf.volume = 1; sf.play().catch(() => {});
    setTimeout(() => { document.getElementById('wowEffect').classList.add('visible'); }, 500);
    setTimeout(() => { document.getElementById('ctaButton').style.display = 'block'; }, 1500);
    setTimeout(() => {
        document.getElementById('overlay').style.opacity = '1';
        document.getElementById('bgAnimation').style.filter = 'blur(2px) brightness(0.6)';
    }, 3000);
}

/* EVENT LISTENERS */
canvas.addEventListener('pointerdown', e => {
    if (!gameActive || finished) return;
    drawing = true;
    if (!isMuted) document.getElementById('soundScrub').play().catch(() => {});
    const r = canvas.getBoundingClientRect();
    lastX = e.clientX - r.left; lastY = e.clientY - r.top;
});

window.addEventListener('pointermove', e => {
    const r = canvas.getBoundingClientRect();
    handleMove(e.clientX - r.left, e.clientY - r.top);
});

window.addEventListener('pointerup', () => {
    drawing = false; lastX = null;
    document.getElementById('soundScrub').pause();
});

function initFog() {
    const fog = new Image(); fog.src = 'assets/fog.webp';
    fog.onload = () => {
        ctx.globalCompositeOperation = 'source-over'; 
        ctx.drawImage(fog, 0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    };
}

function resize() {
    const cont = document.getElementById('container');
    canvas.width = cont.offsetWidth; canvas.height = cont.offsetHeight;
    fxCanvas.width = canvas.width; fxCanvas.height = canvas.height;
    initFog();
}
window.addEventListener('resize', resize);
window.addEventListener('load', resize);

/* MUTE BUTTON LOGIC */
document.getElementById('muteBtn').addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    e.preventDefault();

    if (!audioInitialized) initAudio();

    isMuted = !isMuted;
    const allSounds = document.querySelectorAll('audio');
    allSounds.forEach(s => {
        s.muted = isMuted;
        if (!isMuted && s.id === 'bgMusic') s.play().catch(() => {});
    });

    document.getElementById('muteBtn').innerHTML = isMuted ? '🔇' : '🔊';
    document.getElementById('muteBtn').style.borderColor = isMuted ? 'rgba(255, 0, 0, 0.5)' : 'rgba(255, 255, 255, 0.3)';
});

/* PARTICLES */
class Drop {
    constructor(x, y) {
        this.x = x; this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const power = 2 + Math.random() * 8;
        this.vx = Math.cos(angle) * power; this.vy = Math.sin(angle) * power - 2;
        this.size = 3 + Math.random() * 6;
        this.life = 1; this.decay = 0.01 + Math.random() * 0.02;
    }
    update() { this.vy += 0.2; this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
    draw() {
        fx.beginPath(); fx.fillStyle = `rgba(180, 220, 255, ${this.life})`;
        fx.arc(this.x, this.y, this.size, 0, Math.PI * 2); fx.fill();
    }
}
function spawnWaterDrops(x, y, count) { for (let i = 0; i < count; i++) particles.push(new Drop(x, y)); }
function fxLoop() {
    fx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
    particles.forEach((p, i) => { p.update(); p.draw(); if (p.life <= 0) particles.splice(i, 1); });
    requestAnimationFrame(fxLoop);
}
fxLoop();
</script>
</body>
</html>
